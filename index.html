<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест жүйесі</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

.question {
    margin-bottom: 25px;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.variant {
    display: block;
    margin: 5px 0;
    cursor: pointer;
}

.correct { color: green; }
.incorrect { color: red; }

.pagination button {
    margin: 5px;
}

.active {
    background: blue;
    color: white;
}

img {
    max-width: 400px;
    display: block;
    margin: 10px 0;
    border-radius: 8px;
}
</style>
</head>

<body>

<h1>Тест</h1>

<button onclick="shuffleQuestions()">Барлық сұрақтарды араластыру</button>
<button onclick="resetAll()">Қайта бастау</button>
<button onclick="showAllAnswers()">Жауап көрсету</button>

<div id="quiz"></div>
<div id="pagination"></div>

<script>

let currentPage = 1;
const questionsPerPage = 30;
let allQuestions = [];

/* =========================
   LOAD + PARSE
========================= */

async function loadTest() {
    const response = await fetch('test.txt');
    const text = await response.text();

    allQuestions = parseQuestions(text);

    renderPage(currentPage);
    renderPagination();
}

function parseQuestions(text) {

    const blocks = text.split(/<question>/)
        .map(b => b.trim())
        .filter(b => b.length > 0);

    return blocks.map(block => {

        const questionMatch = block.match(/^(.*?)(<img>|<variant>)/s);
        const question = questionMatch ? questionMatch[1].trim() : '';

        const imgMatch = block.match(/<img>(.*?)\n/);
        const image = imgMatch ? imgMatch[1].trim() : null;

        const variants = [...block.matchAll(/<variant>(.*)/g)]
            .map(m => m[1].trim());

        return {
            question,
            image,
            variants
        };
    });
}

/* =========================
   RENDER
========================= */

function renderPage(page) {
    const start = (page - 1) * questionsPerPage;
    const end = page * questionsPerPage;

    const pageQuestions = allQuestions.slice(start, end);
    renderCustomQuestions(pageQuestions, start);
}

function renderCustomQuestions(questionsArray, globalStartIndex = 0) {

    const quiz = document.getElementById('quiz');
    quiz.innerHTML = '';

    questionsArray.forEach((q, index) => {

        const correctValues = [q.variants[0]];
        const shuffled = shuffle([...q.variants]);

        const qIndex = globalStartIndex + index;

        const div = document.createElement('div');
        div.className = 'question';

        const p = document.createElement('p');
        p.textContent = (qIndex + 1) + '. ' + q.question;

        div.appendChild(p);

        if (q.image) {
            const img = document.createElement('img');
            img.src = q.image;
            div.appendChild(img);
        }

        const result = document.createElement('div');
        result.id = 'result' + qIndex;

        shuffled.forEach((v) => {

            const label = document.createElement('label');
            label.className = 'variant';

            const input = document.createElement('input');

            input.type = 'radio';
            input.name = 'q' + qIndex;
            input.value = v;

            input.addEventListener('change', () => {
                checkAnswer(qIndex, [v], correctValues);
                disableAll(qIndex);
            });

            label.appendChild(input);
            label.appendChild(document.createTextNode(' ' + v));

            div.appendChild(label);
        });

        div.appendChild(result);
        quiz.appendChild(div);
    });
}

/* =========================
   LOGIC
========================= */

function checkAnswer(qIndex, selectedValues, correctValues) {
    const result = document.getElementById('result' + qIndex);

    const isCorrect =
        selectedValues.length === correctValues.length &&
        selectedValues.every(v => correctValues.includes(v));

    if (isCorrect) {
        result.textContent = 'Дұрыс ✅';
        result.className = 'correct';
    } else {
        result.innerHTML = `
            Қате ❌<br>
            Дұрыс жауап: <b>${correctValues[0]}</b>
        `;
        result.className = 'incorrect';
    }
}

function disableAll(qIndex) {
    document.querySelectorAll(`input[name="q${qIndex}"]`)
        .forEach(el => el.disabled = true);
}

/* =========================
   UTILS
========================= */

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function shuffleQuestions() {
    allQuestions = shuffle([...allQuestions]);
    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
}

/* =========================
   PAGINATION
========================= */

function renderPagination() {
    const div = document.getElementById('pagination');
    div.innerHTML = '';

    const pages = Math.ceil(allQuestions.length / questionsPerPage);

    for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;

        if (i === currentPage) btn.classList.add('active');

        btn.onclick = () => {
            currentPage = i;
            renderPage(i);
            renderPagination();
        };

        div.appendChild(btn);
    }
}

/* =========================
   OTHER
========================= */

function resetAll() {
    loadTest();
}

function showAllAnswers() {
    document.querySelectorAll('[id^="result"]').forEach(r => {
        r.style.display = 'block';
    });
}

loadTest();

</script>

</body>
</html>
