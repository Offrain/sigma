<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест жүйесі</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

.question {
    margin-bottom: 25px;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.variant {
    display: block;
    margin: 5px 0;
    cursor: pointer;
}

.correct { color: green; }
.incorrect { color: red; }

.pagination button {
    margin: 5px;
}

.active {
    background: blue;
    color: white;
}

img {
    max-width: 300px;
    display: block;
    margin: 10px 0;
}
</style>
</head>

<body>

<h1>Тест</h1>

<button onclick="shuffleQuestions()">Барлық сұрақтарды араластыру</button>
<button onclick="resetAll()">Қайта бастау</button>

<div id="quiz"></div>
<div id="pagination"></div>

<script>

let currentPage = 1;
const questionsPerPage = 30;
let allQuestions = [];

// 🚀 ЗАГРУЗКА .qst
async function loadTest() {
    const response = await fetch('test.qst');
    const text = await response.text();

    allQuestions = text
        .split('<question>')
        .map(q => q.trim())
        .filter(q => q.length > 0);

    renderPage(currentPage);
    renderPagination();
}

// 📄 ОТРИСОВКА СТРАНИЦЫ
function renderPage(page) {
    const start = (page - 1) * questionsPerPage;
    const end = page * questionsPerPage;

    const pageQuestions = allQuestions.slice(start, end);
    renderCustomQuestions(pageQuestions, start);
}

// 🧠 ОСНОВНАЯ ЛОГИКА
function renderCustomQuestions(questionsArray, globalStartIndex = 0) {

    const quiz = document.getElementById('quiz');
    quiz.innerHTML = '';

    questionsArray.forEach((block, index) => {

        const lines = block.split('\n').map(l => l.trim()).filter(l => l);

        let questionText = '';
        let variants = [];
        let image = null;

        lines.forEach(line => {

            if (line.startsWith('<variant>')) {
                variants.push(line.replace('<variant>', '').trim());
            } 
            else if (line.startsWith('<img>')) {
                image = line.replace('<img>', '').trim();
            }
            else {
                questionText += line + ' ';
            }

        });

        const correctValues = [variants[0]]; // ✅ первый всегда правильный
        const shuffled = shuffle([...variants]);

        const qIndex = globalStartIndex + index;

        const div = document.createElement('div');
        div.className = 'question';

        const p = document.createElement('p');
        p.textContent = (qIndex + 1) + '. ' + questionText;

        div.appendChild(p);

        // 🖼️ картинка
        if (image) {
            const img = document.createElement('img');
            img.src = image;
            div.appendChild(img);
        }

        const result = document.createElement('div');
        result.id = 'result' + qIndex;

        shuffled.forEach((v) => {

            const label = document.createElement('label');
            label.className = 'variant';

            const input = document.createElement('input');
            input.type = 'radio';
            input.name = 'q' + qIndex;
            input.value = v;

            input.addEventListener('change', () => {
                checkAnswer(qIndex, [v], correctValues);
                disableAll(qIndex);
            });

            label.appendChild(input);
            label.appendChild(document.createTextNode(' ' + v));

            div.appendChild(label);
        });

        div.appendChild(result);
        quiz.appendChild(div);
    });
}

// ✅ ПРОВЕРКА
function checkAnswer(qIndex, selectedValues, correctValues) {
    const result = document.getElementById('result' + qIndex);

    const isCorrect = selectedValues[0] === correctValues[0];

    if (isCorrect) {
        result.textContent = 'Дұрыс ✅';
        result.className = 'correct';
    } else {
        result.innerHTML = `Қате ❌<br>Дұрыс жауап: <b>${correctValues[0]}</b>`;
        result.className = 'incorrect';
    }
}

// 🔒 БЛОКИРОВКА
function disableAll(qIndex) {
    document.querySelectorAll(`input[name="q${qIndex}"]`)
        .forEach(el => el.disabled = true);
}

// 🔀 ПЕРЕМЕШАТЬ
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// 🔀 ВСЕ ВОПРОСЫ
function shuffleQuestions() {
    allQuestions = shuffle([...allQuestions]);
    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
}

// 📄 ПАГИНАЦИЯ
function renderPagination() {
    const div = document.getElementById('pagination');
    div.innerHTML = '';

    const pages = Math.ceil(allQuestions.length / questionsPerPage);

    for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;

        if (i === currentPage) btn.classList.add('active');

        btn.onclick = () => {
            currentPage = i;
            renderPage(i);
            renderPagination();
        };

        div.appendChild(btn);
    }
}

// 🔄 СБРОС
function resetAll() {
    loadTest();
}

loadTest();

</script>

</body>
</html>
