<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест жүйесі</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

.question {
    margin-bottom: 25px;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.variant {
    display: block;
    margin: 5px 0;
    cursor: pointer;
}

.correct { color: green; }
.incorrect { color: red; }

.pagination button {
    margin: 5px;
}

.active {
    background: blue;
    color: white;
}

pre {
    white-space: pre-line;
}
</style>
</head>

<body>

<h1>Тест</h1>

<!-- 🔥 НОВЫЙ БЛОК -->
<div style="margin-bottom:15px;">

    <label>Сұрақ саны:</label>
    <input type="number" id="countQ" placeholder="мысалы 50" style="width:80px;">

    <br><br>

    <label>Диапазон:</label>
    <input type="number" id="rangeStart" placeholder="от" style="width:60px;">
    <input type="number" id="rangeEnd" placeholder="до" style="width:60px;">

    <button onclick="generateRandomRange()">Бастау</button>

</div>

<button onclick="shuffleQuestions()">Барлық сұрақтарды араластыру</button>
<button onclick="shuffleCurrentPage()">Осы беттегі сұрақтарды араластыру</button>
<button onclick="resetAll()">Қайта бастау</button>
<button onclick="showAllAnswers()">Жауап көрсету</button>

<div id="quiz"></div>
<div id="pagination"></div>

<script>

let currentPage = 1;
const questionsPerPage = 30;
let allQuestions = [];

async function loadTest() {
    const response = await fetch('test.txt');
    const text = await response.text();

    allQuestions = text
        .split('~~')
        .map(q => q.trim())
        .filter(q => q.length > 0);

    renderPage(currentPage);
    renderPagination();
}
    
function showAllAnswers() {
    const questions = document.querySelectorAll('.question');

    questions.forEach(q => {
        const resultDiv = q.querySelector('[id^="result"]');

        if (!resultDiv) return;

        const qIndex = parseInt(resultDiv.id.replace('result', ''));

        // ищем все варианты ответа
        const inputs = q.querySelectorAll('input');

        let correctValues = [];

        // берем правильные ответы из уже сохранённого результата проверки нельзя,
        // поэтому пересчитаем из allQuestions
        const block = allQuestions[qIndex];

        if (!block) return;

        const answerMatch = block.match(/\{@([A-Z]+)@\}/);
        const correctLetters = answerMatch ? answerMatch[1].split('') : ['A'];

        const cleanBlock = block.replace(/\{@[A-Z]+@\}/, '');

        const parts = cleanBlock
            .split('@@')
            .map(p => p.trim())
            .filter(p => p.length > 0);

        const variants = parts.slice(1);

        correctValues = correctLetters.map(l => variants[l.charCodeAt(0) - 65]);

        // показать правильные варианты
        inputs.forEach(inp => {
            if (correctValues.includes(inp.value)) {
                inp.parentElement.style.color = 'green';
                inp.parentElement.style.fontWeight = 'bold';
            }
        });

        // вывести текст ответа
        resultDiv.innerHTML =
            `✔ Дұрыс жауап: <b>${correctValues.join(', ')}</b>`;
        resultDiv.className = 'correct';
    });
}
    
function renderPage(page) {
    const quiz = document.getElementById('quiz');
    quiz.innerHTML = '';

    const start = (page - 1) * questionsPerPage;
    const end = page * questionsPerPage;

    const pageQuestions = allQuestions.slice(start, end);

    renderCustomQuestions(pageQuestions, start);
}

function renderCustomQuestions(questionsArray, globalStartIndex = 0) {

    const quiz = document.getElementById('quiz');
    quiz.innerHTML = '';

    questionsArray.forEach((block, index) => {

        const answerMatch = block.match(/\{@([A-Z]+)@\}/);
        const correctLetters = answerMatch ? answerMatch[1].split('') : ['A'];

        const isMulti = correctLetters.length > 1;

        const cleanBlock = block.replace(/\{@[A-Z]+@\}/, '');

        const parts = cleanBlock
            .split('@@')
            .map(p => p.trim())
            .filter(p => p.length > 0);

        const question = parts[0];
        const variants = parts.slice(1);

        const correctValues = correctLetters.map(l => variants[l.charCodeAt(0) - 65]);

        const shuffled = shuffle([...variants]);

        const qIndex = globalStartIndex + index;

        const div = document.createElement('div');
        div.className = 'question';

        const p = document.createElement('p');
        p.style.whiteSpace = 'pre-line';
        p.textContent = (qIndex + 1) + '. ' + question;

        div.appendChild(p);

        const result = document.createElement('div');
        result.id = 'result' + qIndex;

        shuffled.forEach((v) => {

            const label = document.createElement('label');
            label.className = 'variant';

            const input = document.createElement('input');

            input.type = isMulti ? 'checkbox' : 'radio';
            input.name = 'q' + qIndex;
            input.value = v;

            input.addEventListener('change', () => {

                const selectedInputs =
                    document.querySelectorAll(`input[name="q${qIndex}"]:checked`);

                const selectedValues =
                    Array.from(selectedInputs).map(i => i.value);

                if (!isMulti) {
                    checkAnswer(qIndex, selectedValues, correctValues);
                    disableAll(qIndex);
                    return;
                }

                if (selectedValues.length === correctValues.length) {
                    checkAnswer(qIndex, selectedValues, correctValues);
                    disableAll(qIndex);
                }
            });

            label.appendChild(input);
            label.appendChild(document.createTextNode(' ' + v));

            div.appendChild(label);
        });

        div.appendChild(result);
        quiz.appendChild(div);
    });
}

function checkAnswer(qIndex, selectedValues, correctValues) {
    const result = document.getElementById('result' + qIndex);

    const isCorrect =
        selectedValues.length === correctValues.length &&
        selectedValues.every(v => correctValues.includes(v));

    if (isCorrect) {
        result.textContent = 'Дұрыс ✅';
        result.className = 'correct';
    } else {
        result.innerHTML = `
            Қате ❌<br>
            Дұрыс жауаптар: <b>${correctValues.join(', ')}</b>
        `;
        result.className = 'incorrect';
    }
}

function disableAll(qIndex) {
    document.querySelectorAll(`input[name="q${qIndex}"]`)
        .forEach(el => el.disabled = true);
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function shuffleQuestions() {
    allQuestions = shuffle([...allQuestions]);
    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
}

function shuffleCurrentPage() {
    const start = (currentPage - 1) * questionsPerPage;
    const end = start + questionsPerPage;

    const part = allQuestions.slice(start, end);
    const shuffled = shuffle([...part]);

    for (let i = 0; i < shuffled.length; i++) {
        allQuestions[start + i] = shuffled[i];
    }

    renderPage(currentPage);
}

function renderPagination() {
    const div = document.getElementById('pagination');
    div.innerHTML = '';

    const pages = Math.ceil(allQuestions.length / questionsPerPage);

    for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;

        if (i === currentPage) btn.classList.add('active');

        btn.onclick = () => {
            currentPage = i;
            renderPage(i);
            renderPagination();
        };

        div.appendChild(btn);
    }
}

function resetAll() {
    loadTest();
}

/* 🔥 ГЛАВНАЯ НОВАЯ ФУНКЦИЯ */
function generateRandomRange() {

    const count = parseInt(document.getElementById('countQ').value);
    let start = parseInt(document.getElementById('rangeStart').value) - 1;
    let end = parseInt(document.getElementById('rangeEnd').value);

    if (!count || isNaN(start) || isNaN(end) || start < 0 || end <= start) {
        alert('Қате енгізу');
        return;
    }

    if (end > allQuestions.length) end = allQuestions.length;

    let range = allQuestions.slice(start, end);

    range = shuffle([...range]);

    const selected = range.slice(0, count);

    document.getElementById('pagination').innerHTML = '';

    renderCustomQuestions(selected, start);
}

loadTest();

</script>

</body>
</html>
